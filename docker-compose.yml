services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LAB_NAME: ${LAB_NAME}
      LAB_EMAIL: ${LAB_EMAIL}
      LAB_ADDRESS: ${LAB_ADDRESS}
      LAB_PHONE: ${LAB_PHONE}
      LAB_LOGO_TEXT: ${LAB_LOGO_TEXT}
      LAB_LOGO_URL: ${LAB_LOGO_URL}
    ports:
      - "3000:3000"
    volumes:
      - ${BACKUP_HOST_DIR}:/app/backups
    command: >-
      sh -c 'echo "DATABASE_URL=$$DATABASE_URL"; node migrate.js; if [ $$? -ne 0 ]; then exit 1; fi; npm run start'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_LOGO_URL: /assets/logo.jpg
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
